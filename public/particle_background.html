<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Forest Particle Background</title>
    <!-- Lightweight tsParticles library bundle -->
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            /* Put gradient directly on body */
            background: #021114;
            background: linear-gradient(135deg, #021114 0%, #04293a 50%, #064663 100%);
        }

        /* Container for content */
        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
            text-align: center;
            padding: 20px;
        }

        /* Enforce absolute positioning on tsparticles wrapper */
        #tsparticles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            /* Positive stack order behind content */
            pointer-events: none;
            /* Let clicks pass through if needed, but we intercept below explicitly */
        }

        #tsparticles canvas {
            display: block;
            vertical-align: bottom;
            pointer-events: auto;
            /* Required for hover */
        }

        .glass-panel {
            background: rgba(4, 41, 58, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 60px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            pointer-events: auto;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }

        p {
            font-size: 1.2rem;
            max-width: 600px;
            margin-bottom: 30px;
            line-height: 1.6;
            color: #a0d2eb;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: transparent;
            color: #00ffcc;
            border: 2px solid #00ffcc;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        }

        .btn:hover {
            background: #00ffcc;
            color: #021114;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.6);
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

    <!-- Particle Container -->
    <div id="tsparticles"></div>

    <div class="content">
        <div class="glass-panel">
            <h1>Digital Forest</h1>
            <p>A fusion of technology and nature. Neural networks weaving through deep digital canopies. Hover around to
                interact with the neural roots.</p>
            <a href="#" class="btn">Explore Now</a>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            tsParticles.load("tsparticles", {
                fullScreen: {
                    enable: false, // Prevents library from fighting custom z-index/position
                    zIndex: 1
                },
                fpsLimit: 60,
                particles: {
                    number: {
                        value: 80,
                        density: { enable: true, area: 800 }
                    },
                    color: {
                        value: ["#00ffcc", "#00bbf9", "#48cae4", "#2d4a2b"]
                    },
                    shape: {
                        type: "circle"
                    },
                    opacity: {
                        value: { min: 0.2, max: 0.8 },
                        animation: {
                            enable: true,
                            speed: 1,
                            sync: false,
                            minimumValue: 0.1
                        }
                    },
                    size: {
                        value: { min: 1, max: 3 },
                        animation: {
                            enable: true,
                            speed: 2,
                            sync: false,
                            minimumValue: 0.5
                        }
                    },
                    links: {
                        enable: true,
                        distance: 150,
                        color: "#48cae4",
                        opacity: 0.4,
                        width: 1,
                        triangles: { enable: false }
                    },
                    move: {
                        enable: true,
                        speed: 0.6,
                        direction: "none",
                        random: true,
                        straight: false,
                        outModes: {
                            default: "bounce"
                        }
                    }
                },
                interactivity: {
                    detectsOn: "window", // Changed to window to ensure interaction works globally over canvas
                    events: {
                        onHover: {
                            enable: true,
                            mode: "grab"
                        },
                        onClick: {
                            enable: true,
                            mode: "push"
                        },
                        resize: true
                    },
                    modes: {
                        grab: {
                            distance: 200,
                            links: {
                                opacity: 0.6,
                                color: "#00ffcc"
                            }
                        },
                        push: { quantity: 2 }
                    }
                },
                detectRetina: true
            }).then(() => {
                console.log("tsParticles loaded inside #tsparticles div!");
            });
        });
    </script>
</body>

</html>
